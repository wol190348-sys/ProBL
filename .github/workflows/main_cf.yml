name: Bleems Scraper → Cloudflare R2

on:
  # Run every day at 02:00 UTC
  schedule:
    - cron: "0 2 * * *"

  # Also allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  # ── Job 1: Discover categories dynamically ───────────────────────────────
  discover:
    name: Discover Categories
    runs-on: ubuntu-latest
    outputs:
      categories: ${{ steps.get-categories.outputs.categories }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade --cache-dir ~/.cache/pip -r requirements.txt

      - name: Discover categories
        id: get-categories
        run: |
          CATEGORIES=$(python CF/scraper.py --list-categories)
          echo "categories=$CATEGORIES" >> $GITHUB_OUTPUT
          echo "Discovered categories: $CATEGORIES"

  # ── Job 2: Scrape each category in parallel ──────────────────────────────
  scrape:
    name: Scrape ${{ matrix.category }}
    runs-on: ubuntu-latest
    needs: discover

    strategy:
      max-parallel: 4       # Limit to 4 categories in parallel
      fail-fast: false      # Continue other jobs if one fails
      matrix:
        category: ${{ fromJSON(needs.discover.outputs.categories) }}

    env:
      # ── Cloudflare R2 credentials & bucket ───────────────────────────────
      CF_R2_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL:      ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME:       ${{ secrets.CF_R2_BUCKET_NAME }}

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install --upgrade --cache-dir ~/.cache/pip -r requirements.txt

      # ── 4. Run scraper for specific category ──────────────────────────────
      - name: Run Bleems scraper (R2) - ${{ matrix.category }}
        run: python CF/scraper.py --category "${{ matrix.category }}"

      # ── 5. Confirm files landed in R2 via AWS CLI (R2 is S3-compatible) ───
      - name: Verify R2 upload
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 ls s3://${{ secrets.CF_R2_BUCKET_NAME }}/bleems-data/ \
            --recursive --human-readable \
            --endpoint-url ${{ secrets.CF_R2_ENDPOINT_URL }} \
            | grep "${{ matrix.category }}" \
            | tail -10
